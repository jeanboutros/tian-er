<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarification Table</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card-bg: #16213e;
    --card-border: #1f3460;
    --text: #e0e0e0;
    --text-secondary: #8892b0;
    --text-muted: #5a6785;
    --accent: #64ffda;
    --accent-dim: #3db89e;
    --danger: #ff6b6b;
    --danger-bg: rgba(255, 107, 107, 0.12);
    --danger-border: rgba(255, 107, 107, 0.3);
    --warning: #ffd93d;
    --warning-bg: rgba(255, 217, 61, 0.12);
    --warning-border: rgba(255, 217, 61, 0.3);
    --success: #6bff8e;
    --success-bg: rgba(107, 255, 142, 0.12);
    --success-border: rgba(107, 255, 142, 0.3);
    --highlight: rgba(100, 255, 218, 0.08);
    --input-bg: #0a1628;
    --input-border: #2a3a5c;
    --input-focus: #64ffda;
    --radio-dot: #64ffda;
    --summary-hover: rgba(100, 255, 218, 0.04);
    --expand-border: #64ffda;
    --shadow: 0 2px 16px rgba(0, 0, 0, 0.35);
    --transition: 0.2s ease;
  }

  [data-theme="light"] {
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --card-border: #dde1e7;
    --text: #1a1a2e;
    --text-secondary: #4a5568;
    --text-muted: #a0aec0;
    --accent: #2b6cb0;
    --accent-dim: #1a4f8a;
    --danger: #e53e3e;
    --danger-bg: rgba(229, 62, 62, 0.08);
    --danger-border: rgba(229, 62, 62, 0.22);
    --warning: #b7791f;
    --warning-bg: rgba(183, 121, 31, 0.1);
    --warning-border: rgba(183, 121, 31, 0.25);
    --success: #2f855a;
    --success-bg: rgba(47, 133, 90, 0.08);
    --success-border: rgba(47, 133, 90, 0.2);
    --highlight: rgba(43, 108, 176, 0.06);
    --input-bg: #ffffff;
    --input-border: #cbd5e0;
    --input-focus: #2b6cb0;
    --radio-dot: #2b6cb0;
    --summary-hover: rgba(43, 108, 176, 0.04);
    --expand-border: #2b6cb0;
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
    transition: background var(--transition), color var(--transition);
    line-height: 1.5;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.01em;
  }

  .header .subtitle {
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Theme Toggle */
  .theme-toggle {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 14px;
    cursor: pointer;
    font-size: 0.8125rem;
    font-family: inherit;
    font-weight: 600;
    transition: background var(--transition), border var(--transition), color var(--transition);
    white-space: nowrap;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Meta Bar */
  .meta-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    padding: 14px 18px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
  }

  .meta-field {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8125rem;
  }

  .meta-field label {
    color: var(--text-secondary);
    font-weight: 600;
    white-space: nowrap;
  }

  .meta-field input {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 0.8125rem;
    font-family: monospace;
    width: 130px;
    transition: border var(--transition);
  }

  .meta-field input:focus {
    outline: none;
    border-color: var(--input-focus);
  }

  .progress {
    font-weight: 600;
    color: var(--accent);
    font-size: 0.875rem;
    white-space: nowrap;
  }

  .spacer {
    flex: 1;
  }

  /* Buttons */
  .bulk-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 8px 16px;
    border: 1px solid var(--card-border);
    border-radius: 6px;
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    font-size: 0.8125rem;
    font-family: inherit;
    font-weight: 600;
    transition: background var(--transition), border var(--transition), color var(--transition);
    white-space: nowrap;
  }

  .btn:hover {
    border-color: var(--accent);
    background: var(--highlight);
  }

  .btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .btn-primary {
    background: var(--accent);
    color: #1a1a2e;
    border-color: var(--accent);
    font-weight: 700;
  }

  .btn-primary:hover {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
    color: #1a1a2e;
  }

  .btn-danger {
    border-color: var(--danger);
    color: var(--danger);
  }

  .btn-danger:hover {
    background: var(--danger-bg);
  }

  .btn:active {
    transform: scale(0.98);
  }

  /* Table Container */
  .table-container {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  /* Column Headers */
  .table-header {
    display: grid;
    grid-template-columns: 46px 1fr 310px 100px;
    padding: 12px 14px;
    background: var(--card-bg);
    border-bottom: 2px solid var(--card-border);
    font-size: 0.6875rem;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .table-header > * {
    padding: 0 6px;
  }

  /* Row (details element) */
  details.question-row {
    display: block;
    border-bottom: 1px solid var(--card-border);
    transition: background var(--transition);
  }

  details.question-row:last-of-type {
    border-bottom: none;
  }

  details.question-row[open] {
    background: var(--highlight);
  }

  summary.row-summary {
    display: grid;
    grid-template-columns: 46px 1fr 310px 100px;
    padding: 12px 14px;
    cursor: pointer;
    list-style: none;
    align-items: start;
    transition: background var(--transition);
    outline: none;
    user-select: none;
  }

  summary.row-summary::-webkit-details-marker {
    display: none;
  }

  summary.row-summary:hover {
    background: var(--summary-hover);
  }

  summary.row-summary:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
    border-radius: 4px;
  }

  summary.row-summary > * {
    padding: 0 6px;
  }

  /* Column Cells */
  .col-num {
    color: var(--text-muted);
    font-size: 0.75rem;
    font-weight: 600;
    padding-top: 1px;
    text-align: center;
  }

  .col-question {
    font-size: 0.875rem;
    font-weight: 600;
    display: flex;
    align-items: flex-start;
    gap: 6px;
    line-height: 1.4;
    cursor: pointer;
  }

  .col-question .expand-icon {
    color: var(--text-muted);
    font-size: 0.6875rem;
    transition: transform 0.15s ease;
    flex-shrink: 0;
    margin-top: 3px;
  }

  details[open] .col-question .expand-icon {
    transform: rotate(90deg);
  }

  .col-question-text {
    pointer-events: none;
  }

  .col-answers {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* Radio Groups */
  .radio-group {
    display: flex;
    flex-wrap: wrap;
    gap: 7px 10px;
    align-items: center;
  }

  .radio-option {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .radio-option input[type="radio"] {
    appearance: none;
    -webkit-appearance: none;
    width: 15px;
    height: 15px;
    border: 2px solid var(--input-border);
    border-radius: 50%;
    margin: 0;
    cursor: pointer;
    position: relative;
    transition: border-color var(--transition);
    flex-shrink: 0;
    background: var(--input-bg);
  }

  .radio-option input[type="radio"]:checked {
    border-color: var(--radio-dot);
  }

  .radio-option input[type="radio"]:checked::after {
    content: '';
    position: absolute;
    top: 2.5px;
    left: 2.5px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--radio-dot);
  }

  .radio-option input[type="radio"]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .radio-option.radio-recommended {
    color: var(--accent);
    font-weight: 700;
  }

  .radio-option.radio-recommended input[type="radio"] {
    border-color: var(--accent);
  }

  .radio-option.radio-recommended input[type="radio"]:checked::after {
    background: var(--accent);
  }

  .custom-input {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    color: var(--text);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-family: inherit;
    min-width: 130px;
    transition: border-color var(--transition);
  }

  .custom-input:focus {
    outline: none;
    border-color: var(--input-focus);
  }

  .custom-input:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .custom-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .col-impact {
    padding-top: 1px;
    text-align: center;
  }

  /* Impact Badges */
  .impact-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    white-space: nowrap;
    text-transform: uppercase;
  }

  .impact-HIGH {
    background: var(--danger-bg);
    color: var(--danger);
    border: 1px solid var(--danger-border);
  }

  .impact-MEDIUM {
    background: var(--warning-bg);
    color: var(--warning);
    border: 1px solid var(--warning-border);
  }

  .impact-LOW {
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid var(--success-border);
  }

  /* Expanded Detail Section */
  .expanded-detail {
    padding: 18px 22px 22px 22px;
    margin-left: 46px;
    border-left: 3px solid var(--expand-border);
    display: grid;
    gap: 14px;
    font-size: 0.8125rem;
  }

  .detail-block {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .detail-label {
    font-weight: 700;
    font-size: 0.6875rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--accent);
  }

  .detail-value {
    color: var(--text-secondary);
    line-height: 1.5;
  }

  .detail-source {
    font-family: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .detail-recommended {
    background: var(--highlight);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 10px 14px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1.5;
  }

  .detail-options-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .detail-options-list li {
    padding: 7px 12px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    font-size: 0.8125rem;
    color: var(--text-secondary);
  }

  /* Expanded Answer Controls */
  .expanded-answers {
    border-top: 1px solid var(--card-border);
    padding-top: 14px;
    margin-top: 4px;
  }

  .expanded-answers .radio-group {
    margin-bottom: 6px;
  }

  /* No Questions State */
  .empty-state {
    text-align: center;
    padding: 56px 24px;
    color: var(--text-muted);
  }

  .empty-state .empty-icon {
    font-size: 2rem;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .empty-state p {
    font-size: 0.9375rem;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 22px;
    border-radius: 8px;
    font-size: 0.8125rem;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    z-index: 1000;
    animation: toastIn 0.25s ease;
    opacity: 1;
    transition: opacity 0.3s ease;
  }

  .toast-error {
    background: #c53030;
    color: #fff;
  }

  .toast-success {
    background: #2f855a;
    color: #fff;
  }

  @keyframes toastIn {
    from { transform: translateY(12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Responsive */
  @media (max-width: 860px) {
    .table-header,
    summary.row-summary {
      grid-template-columns: 36px 1fr 240px 80px;
    }
    .col-answers .radio-group {
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
  }

  @media (max-width: 700px) {
    .table-header,
    summary.row-summary {
      grid-template-columns: 30px 1fr 110px;
    }
    .col-impact { display: none; }
    .table-header .col-impact-hdr { display: none; }
    .expanded-detail { margin-left: 0; }
    .meta-bar { flex-direction: column; align-items: flex-start; gap: 8px; }
  }

  @media (max-width: 500px) {
    .table-header,
    summary.row-summary {
      grid-template-columns: 26px 1fr;
    }
    .col-answers { display: none; }
    .expanded-answers { display: block !important; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <h1>Clarification Table</h1>
      <p class="subtitle">Answer all blocked questions to resume the pipeline</p>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark theme">☀ Light</button>
    </div>
  </div>

  <div class="meta-bar">
    <div class="meta-field">
      <label for="ticketId">Ticket:</label>
      <input type="text" id="ticketId" value="TASK-001" placeholder="TASK-XXX">
    </div>
    <div class="meta-field">
      <label for="sourceAgent">Agent:</label>
      <input type="text" id="sourceAgent" value="software-engineer" placeholder="agent-name">
    </div>
    <div class="spacer"></div>
    <div class="progress" id="progress">0 of 0 answered</div>
  </div>

  <div class="bulk-actions">
    <button class="btn" id="setAllRecommended">Set All to Recommended</button>
    <button class="btn btn-danger" id="resetAll">Reset All</button>
  </div>

  <div class="table-container" id="tableContainer">
    <div class="table-header">
      <div>#</div>
      <div>Question</div>
      <div>Your Answer</div>
      <div class="col-impact-hdr">Impact</div>
    </div>
    <div id="rowsContainer">
      <!-- Rendered by JavaScript -->
    </div>
  </div>

  <div class="bulk-actions" style="margin-top: 16px; justify-content: flex-end;">
    <button class="btn btn-primary" id="saveBtn">Save Answers</button>
  </div>

</div>

<div id="toastContainer"></div>

<script>
// ══════════════════════════════════════════════════════
// DATA INJECTION POINT
//
// When generating the final HTML for a specific session,
// replace the array below (from the first `[` to the
// matching `];`) with the actual clarification questions.
// The token ___QUESTIONS_JSON___ marks the target.
//
// For the template file (this file), sample data is
// provided so the table renders when opened directly.
// ══════════════════════════════════════════════════════

// ___QUESTIONS_JSON___ — replace the array on the next line
var QUESTION_DATA = [
  {
    "id": "q1",
    "question": "What is the reset value of RF_CH bit 7?",
    "context": "Analyzing nRF24L01+ register map (address 0x05), RF_CH register. Bit 7 is defined in the datasheet as a reserved bit with no documented function. Some errata suggest it may affect frequency selection on clone chips.",
    "recommended": "Write 0. The official Nordic datasheet §6.4 states reserved bits must be written as 0 to ensure forward compatibility.",
    "options": [
      "Option A: Write 0 (as per Nordic datasheet §6.4 — reserved bits must be 0)",
      "Option B: Write 1 (some clone chip errata mention alternate behavior)"
    ],
    "impact": "HIGH",
    "impact_detail": "Wrong value silently corrupts frequency selection. Affects entire BLE channel mapping downstream — channels 37, 38, and 39 may shift unpredictably. Undetectable except by cross-referencing with an nRF52840 sniffer.",
    "source": "nRF24L01+ Product Specification v1.0, page 34, §6.4 — RF_CH register description"
  },
  {
    "id": "q2",
    "question": "What is the initial seed value for BLE data whitening? Is it channel-dependent?",
    "context": "Implementing BLE advertising channel dewhitening. The BLE Core Specification §3.2 describes a 7-bit linear feedback shift register (LFSR) for data whitening. The LFSR polynomial is x^7 + x^4 + 1. The seed (initial LFSR state) depends on the channel index.",
    "recommended": "Use channel-index as the seed. Per BLE Core Spec v5.3 §3.2, the whitening LFSR is initialized with bits 0-6 set to the channel index (0-39). For advertising channels: channel 37 → seed 0x25, channel 38 → seed 0x26, channel 39 → seed 0x27.",
    "options": [
      "Option A: Channel-index as seed, position 0 (BLE Core Spec v5.3 §3.2)",
      "Option B: Fixed seed 0x00 regardless of channel (observed in some BLE sniffers for backward compat)",
      "Option C: Channel-index shifted left by 1 before seeding (old nRF51 workaround)"
    ],
    "impact": "HIGH",
    "impact_detail": "Incorrect whitening seed produces garbled PDU data for all packets. The CRC will fail or pass with wrong payload content. Every BLE packet would be silently corrupted — the system would see zero valid packets and you would not know why.",
    "source": "Bluetooth Core Specification v5.3, Vol 6, Part B, §3.2 — Data Whitening"
  },
  {
    "id": "q3",
    "question": "What SPI mode (CPOL/CPHA) does the nRF24L01+ require?",
    "context": "Configuring ESP32 SPI peripheral (spi_bus_initialize) to communicate with the nRF24L01+ radio module. The ESP32 supports SPI modes 0-3 via CPOL and CPHA flags. The nRF24L01+ datasheet shows SPI timing diagrams but does not label CPOL/CPHA explicitly.",
    "recommended": "SPI Mode 0 (CPOL=0, CPHA=0). Clock idles low, data captured on rising edge (first transition). Confirmed by nRF24L01+ timing diagrams in §8.3 — SCK is low when CSN is asserted, and data is sampled on the rising edge of SCK.",
    "options": [
      "Option A: SPI Mode 0 (CPOL=0, CPHA=0) — clock idle low, sample on rising edge",
      "Option B: SPI Mode 3 (CPOL=1, CPHA=1) — observed working on some breakout boards"
    ],
    "impact": "MEDIUM",
    "impact_detail": "Wrong SPI mode causes intermittent register read/write failures. May appear to work partially (some registers read back correctly due to coincidental timing) but will corrupt multi-byte transfers and STATUS register reads. Diagnosed by reading known register defaults.",
    "source": "nRF24L01+ Product Specification v1.0, page 46, §8.3 — SPI Timing"
  },
  {
    "id": "q4",
    "question": "What is the bit ordering convention for the BLE Access Address — LSbit-first or MSbit-first?",
    "context": "Crafting raw BLE advertising PDU for transmission. The Access Address for advertising channels is fixed at 0x8E89BED6. When writing this to the nRF24L01+ TX payload, the bit ordering on the air must match the BLE specification. The BLE spec §2.1 defines over-the-air bit ordering.",
    "recommended": "LSbit-first over the air. BLE Core Spec §2.1 states: 'The least significant bit of a multiple-bit field shall be transmitted first.' The Access Address 0x8E89BED6 is transmitted as bits 0,1,1,0,1,0,1,1,... (LSbit first). The nRF24L01+ transmits LSbit-first by default when LSB_FIRST (bit 5 of FEATURE register) is set.",
    "options": [
      "Option A: LSbit-first (BLE Core Spec §2.1, LSB_FIRST bit set in nRF24L01+ FEATURE reg)",
      "Option B: MSbit-first (natural order, may be default on some platforms)"
    ],
    "impact": "HIGH",
    "impact_detail": "Reversed bit order makes the Access Address unrecognizable to BLE receivers. No device will acknowledge or even detect the advertising packet. The sniffer captures will show valid RF energy but no decodable BLE header. Equivalent to transmitting on the wrong channel.",
    "source": "Bluetooth Core Specification v5.3, Vol 6, Part B, §2.1 — Bit Ordering"
  }
];

// ══════════════════════════════════════════════════════
// END DATA INJECTION POINT
// ══════════════════════════════════════════════════════

// ── State ──
var state = {
  answers: {},
  questionCount: 0,
  answeredCount: 0
};

// ── Theme ──
function getTheme() {
  try {
    return localStorage.getItem('clarification-table-theme') || 'dark';
  } catch (e) {
    return 'dark';
  }
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  try { localStorage.setItem('clarification-table-theme', theme); } catch (e) { /* no-op */ }
  var btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'light' ? '🌙 Dark' : '☀ Light';
}

function toggleTheme() {
  var current = getTheme();
  setTheme(current === 'dark' ? 'light' : 'dark');
}

// ── DOM helpers ──
function byId(id) { return document.getElementById(id); }

// ── Progress ──
function updateProgress() {
  var count = 0;
  for (var i = 0; i < state.questionCount; i++) {
    var qid = QUESTION_DATA[i].id;
    var answer = state.answers[qid];
    if (answer && answer.choice) {
      if (answer.choice === 'custom' && (!answer.custom || answer.custom.trim() === '')) {
        continue;
      }
      count++;
    }
  }
  state.answeredCount = count;
  byId('progress').textContent = count + ' of ' + state.questionCount + ' answered';
}

// ── Set answer ──
function setAnswer(qid, choice, customValue) {
  state.answers[qid] = { choice: choice, custom: (choice === 'custom' ? customValue : null) };
  updateProgress();
}

function getAnswer(qid) {
  return state.answers[qid] || { choice: null, custom: null };
}

// ── HTML escaping ──
function esc(text) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

function escAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Build radio group ──
function buildRadioGroup(qid, question, prefix) {
  var optLen = question.options ? question.options.length : 0;
  var answer = getAnswer(qid);
  var html = '<div class="radio-group">';

  html += '<span class="radio-option radio-recommended">';
  html += '<input type="radio" name="' + prefix + 'radio_' + qid + '" value="recommended"';
  if (answer.choice === 'recommended') html += ' checked';
  html += ' id="' + prefix + 'rec_' + qid + '" onchange="onRadioChange(\'' + qid + '\', \'recommended\')">';
  html += '<label for="' + prefix + 'rec_' + qid + '">Recommended</label></span>';

  for (var j = 0; j < optLen; j++) {
    var key = 'option_' + j;
    html += '<span class="radio-option">';
    html += '<input type="radio" name="' + prefix + 'radio_' + qid + '" value="' + key + '"';
    if (answer.choice === key) html += ' checked';
    html += ' id="' + prefix + 'opt_' + qid + '_' + j + '" onchange="onRadioChange(\'' + qid + '\', \'' + key + '\')">';
    html += '<label for="' + prefix + 'opt_' + qid + '_' + j + '">' + esc(question.options[j]) + '</label></span>';
  }

  html += '<span class="radio-option">';
  html += '<input type="radio" name="' + prefix + 'radio_' + qid + '" value="custom"';
  if (answer.choice === 'custom') html += ' checked';
  html += ' id="' + prefix + 'custradio_' + qid + '" onchange="onRadioChange(\'' + qid + '\', \'custom\')">';
  html += '<label for="' + prefix + 'custradio_' + qid + '">Custom:</label></span>';

  html += '<span class="custom-row">';
  html += '<input type="text" class="custom-input" id="' + prefix + 'custom_' + qid + '"';
  html += ' placeholder="Your answer..."';
  if (answer.choice === 'custom' && answer.custom) html += ' value="' + escAttr(answer.custom) + '"';
  if (answer.choice !== 'custom') html += ' disabled';
  html += ' oninput="onCustomInput(\'' + qid + '\', this)">';
  html += '</span>';

  html += '</div>';
  return html;
}

// ── Render single row ──
function renderRow(question, index) {
  var qid = question.id;
  var num = index + 1;
  var impact = question.impact || 'MEDIUM';
  var impactLabel = impact === 'HIGH' ? 'HIGH ⚠' : impact === 'LOW' ? 'Low' : 'MEDIUM';

  var html = '<details class="question-row" name="clarification-group" id="details_' + qid + '">';

  html += '<summary class="row-summary" tabindex="0">';
  html += '<div class="col-num">' + num + '</div>';
  html += '<div class="col-question"><span class="expand-icon">▸</span><span class="col-question-text">' + esc(question.question) + '</span></div>';
  html += '<div class="col-answers" onclick="event.stopPropagation()">';
  html += buildRadioGroup(qid, question, 'c_');
  html += '</div>';
  html += '<div class="col-impact"><span class="impact-badge impact-' + impact + '">' + impactLabel + '</span></div>';
  html += '</summary>';

  html += '<div class="expanded-detail">';

  html += '<div class="detail-block">';
  html += '<span class="detail-label">Context</span>';
  html += '<span class="detail-value">' + esc(question.context || 'No context provided.') + '</span>';
  html += '</div>';

  html += '<div class="detail-block">';
  html += '<span class="detail-label">Recommended Answer</span>';
  html += '<div class="detail-recommended">' + esc(question.recommended || 'No recommendation available.') + '</div>';
  html += '</div>';

  if (question.options && question.options.length > 0) {
    html += '<div class="detail-block">';
    html += '<span class="detail-label">Options</span>';
    html += '<ul class="detail-options-list">';
    for (var o = 0; o < question.options.length; o++) {
      html += '<li>' + esc(question.options[o]) + '</li>';
    }
    html += '</ul></div>';
  }

  html += '<div class="detail-block">';
  html += '<span class="detail-label">Impact — ' + impactLabel + '</span>';
  html += '<span class="detail-value">' + esc(question.impact_detail || question.question) + '</span>';
  html += '</div>';

  if (question.source) {
    html += '<div class="detail-block">';
    html += '<span class="detail-label">Source</span>';
    html += '<span class="detail-source">' + esc(question.source) + '</span>';
    html += '</div>';
  }

  html += '<div class="expanded-answers">';
  html += '<span class="detail-label" style="display:block;margin-bottom:8px;">Your Answer</span>';
  html += buildRadioGroup(qid, question, 'e_');
  html += '</div>';

  html += '</div>';
  html += '</details>';

  return html;
}

function renderAll() {
  state.questionCount = QUESTION_DATA.length;
  var container = byId('rowsContainer');
  if (state.questionCount === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><p>No pending clarification questions.</p><p style="font-size:0.8125rem;margin-top:4px;">Pipeline is unblocked — no data to batch.</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < state.questionCount; i++) {
    html += renderRow(QUESTION_DATA[i], i);
  }
  container.innerHTML = html;
  syncAllRadios();
  updateProgress();
}

// ── Sync radio state between collapsed and expanded ──
function syncRadios(qid) {
  var answer = state.answers[qid];
  if (!answer || !answer.choice) {
    ['c_', 'e_'].forEach(function(p) {
      var rec = document.getElementById(p + 'rec_' + qid);
      var cust = document.getElementById(p + 'custom_' + qid);
      if (rec) rec.checked = false;
      if (cust) { cust.disabled = true; cust.value = ''; }
    });
    return;
  }
  var choice = answer.choice;
  ['c_', 'e_'].forEach(function(p) {
    var radio = document.querySelector('input[name="' + p + 'radio_' + qid + '"][value="' + choice + '"]');
    if (radio) radio.checked = true;
    var custInput = document.getElementById(p + 'custom_' + qid);
    if (custInput) {
      if (choice === 'custom') {
        custInput.disabled = false;
        custInput.value = answer.custom || '';
      } else {
        custInput.disabled = true;
        custInput.value = '';
      }
    }
  });
}

function syncAllRadios() {
  for (var i = 0; i < state.questionCount; i++) {
    syncRadios(QUESTION_DATA[i].id);
  }
}

// ── Event handlers ──
function onRadioChange(qid, choice) {
  setAnswer(qid, choice, choice === 'custom' ? '' : null);
  syncRadios(qid);
}

function onCustomInput(qid, input) {
  var answer = getAnswer(qid);
  if (answer.choice === 'custom') {
    setAnswer(qid, 'custom', input.value);
  }
}

// ── Set all to Recommended ──
function setAllToRecommended() {
  for (var i = 0; i < state.questionCount; i++) {
    setAnswer(QUESTION_DATA[i].id, 'recommended', null);
  }
  syncAllRadios();
  updateProgress();
}

// ── Reset all ──
function resetAll() {
  state.answers = {};
  syncAllRadios();
  updateProgress();
}

// ── Toast ──
function showToast(message, type) {
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  byId('toastContainer').appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    setTimeout(function() { toast.remove(); }, 300);
  }, 3500);
}

// ── Save ──
function saveAnswers() {
  var errors = [];
  for (var i = 0; i < state.questionCount; i++) {
    var qid = QUESTION_DATA[i].id;
    var answer = state.answers[qid];
    if (!answer || !answer.choice) {
      errors.push('Question ' + (i + 1) + ' ("' + QUESTION_DATA[i].question.substring(0, 50) + '..."): no answer selected.');
      continue;
    }
    if (answer.choice === 'custom' && (!answer.custom || answer.custom.trim() === '')) {
      var customInput = document.getElementById('c_custom_' + qid);
      if (customInput) { customInput.focus(); customInput.select(); }
      errors.push('Question ' + (i + 1) + ': Custom answer is empty. Please enter your answer.');
    }
  }
  if (errors.length > 0) {
    showToast(errors[0], 'error');
    return;
  }

  var output = {
    ticket: byId('ticketId').value || 'TASK-UNKNOWN',
    generated_at: new Date().toISOString(),
    source_agent: byId('sourceAgent').value || 'unknown',
    answers: []
  };

  for (var i = 0; i < state.questionCount; i++) {
    var qid2 = QUESTION_DATA[i].id;
    var ans = state.answers[qid2];
    output.answers.push({
      id: qid2,
      question: QUESTION_DATA[i].question,
      choice: ans.choice,
      custom: ans.choice === 'custom' ? ans.custom : null
    });
  }

  var json = JSON.stringify(output, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'clarification-answers.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Downloaded clarification-answers.json', 'success');
}

// ── Keyboard: Enter/Space to toggle details ──
function handleKeyToggle(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    var target = e.target;
    var details = target.closest('details');
    if (details && target.tagName !== 'INPUT' && target.tagName !== 'LABEL') {
      e.preventDefault();
      details.open = !details.open;
    }
  }
}

// ── Boot ──
function boot() {
  setTheme(getTheme());

  byId('themeToggle').addEventListener('click', toggleTheme);
  byId('setAllRecommended').addEventListener('click', setAllToRecommended);
  byId('resetAll').addEventListener('click', resetAll);
  byId('saveBtn').addEventListener('click', saveAnswers);

  renderAll();

  document.addEventListener('keydown', function(e) {
    handleKeyToggle(e);
  });

  byId('ticketId').addEventListener('keydown', function(e) { e.stopPropagation(); });
  byId('sourceAgent').addEventListener('keydown', function(e) { e.stopPropagation(); });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
